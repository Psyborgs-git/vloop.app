# Orchestrator System — Default Configuration

[daemon]
pid_file = "/var/run/orchestrator.pid"
log_level = "info"
foreground = false

[network]
bind_address = "0.0.0.0"
ws_port = 9443
health_port = 9444
canvas_port = 9445
mcp_port = 9446
max_connections = 1000
ping_interval_secs = 30
pong_timeout_secs = 10
[storage]
canvas_path = "./data/canvases"  # 1 MiB

[tls]
cert_path = "./certs/server.crt"
key_path = "./certs/server.key"

[auth]
jwt_public_key_path = "./certs/jwt-public.pem"
jwt_algorithm = "RS256"
jwt_issuer = "orchestrator"
jwt_audience = "orchestrator-api"
session_idle_timeout_secs = 3600
session_max_lifetime_secs = 86400
max_sessions_per_identity = 10
default_token_ttl_secs   = 604800   # 7 days
max_tokens_per_identity  = 50

[database]
engine = "sqlite"
path = "./data/state.db"

[vault]
# Passphrase loaded from ORCH_VAULT_PASSPHRASE env var
max_secret_versions = 5
soft_delete_retention_days = 30

[containerd]
socket_path = "/run/containerd/containerd.sock"
namespace = "orchestrator"

# ── Per-app namespaces ──────────────────────────────────────────────────────

[terminal]
# Directory where terminal session transcripts are stored.
log_path = "./data/terminal-logs"

[db_manager]
# Root directory under which per-workspace SQLite databases are provisioned.
workspaces_path = "./data/workspaces"

[ai_agent]
# Dedicated SQLite database file used by the AI-agent subsystem.
db_path = "./data/ai-agent.db"
